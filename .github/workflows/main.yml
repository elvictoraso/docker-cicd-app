name: CI/CD Pipeline to Docker Hub

# El pipeline se activará automáticamente cada vez que hagas un "push" a la rama main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código de tu repositorio al servidor virtual de GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Configurar la versión de Python en el entorno de ejecución
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instalar las dependencias (pytest y pytest-cov) especificadas en tu requirements.txt
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Ejecutar las pruebas unitarias y calcular la métrica de cobertura en la consola
    - name: Run Tests and Calculate Coverage Metric
      run: |
        pytest --cov=app tests/ --cov-report=term-missing

    # 5. Iniciar sesión de forma segura en Docker Hub usando los Secretos de GitHub
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 6. Construir la imagen de Docker en la nube y subirla (push) a tu Docker Hub
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/docker-cicd-app:latest
          ${{ secrets.DOCKER_USERNAME }}/docker-cicd-app:${{ github.sha }}
